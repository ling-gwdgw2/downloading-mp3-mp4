<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading - Universal Downloader</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FFB7B2 0%, #C7CEEA 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --border-color: #000000;
            --shadow-color: #000000;
            --accent-pink: #FF9AA2;
            --btn-green: #E2F0CB;
            --text-color: #2D2D2D;
            --text-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-color);
            font-family: 'VT323', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: auto;
            font-size: 1.5rem;
            padding: 20px;
        }

        .processing-card {
            background: var(--card-bg);
            border: 4px solid var(--border-color);
            box-shadow: 8px 8px 0px var(--shadow-color);
            border-radius: 0;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 550px;
            width: 100%;
            animation: bounceIn 0.8s ease-out;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            60% {
                transform: scale(1.05);
                opacity: 1;
            }
            100% {
                transform: scale(1);
            }
        }

        .spinner-custom {
            width: 60px;
            height: 60px;
            background: var(--accent-pink);
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--shadow-color);
            animation: bounce 1s infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        h2 {
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px var(--accent-pink);
            font-size: 2.5rem;
        }

        p {
            font-family: var(--text-sans);
            color: var(--text-color);
            font-size: 1.15rem;
            margin-bottom: 1.5rem;
        }

        /* Progress Container */
        .progress-pixel-container {
            border: 4px solid var(--border-color);
            background: white;
            height: 45px;
            box-shadow: 5px 5px 0px var(--shadow-color);
            margin: 1.5rem 0;
            position: relative;
        }

        .progress-pixel-bar {
            background: var(--accent-pink);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease-out;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.6rem;
            text-shadow: 1px 1px 0px white;
        }

        /* Stats Grid */
        .stats-grid {
            display: flex;
            gap: 15px;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            flex: 1;
            border: 4px solid var(--border-color);
            background: white;
            box-shadow: 4px 4px 0px var(--shadow-color);
            padding: 8px;
            text-align: center;
        }

        .stat-label {
            font-family: var(--text-sans);
            font-size: 0.9rem;
            color: #555;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .progress-note {
            font-family: var(--text-sans);
            font-size: 1.05rem;
            padding: 1rem;
            background: #fff;
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--shadow-color);
            color: var(--text-color);
        }
    </style>
</head>

<body>

    <div class="processing-card">
        <div class="spinner-custom" id="spinner"></div>
        <h2>Downloading...</h2>
        <p id="statusMessage">Initializing download parameters...</p>

        <!-- Progress Bar -->
        <div class="progress-pixel-container" id="progressContainer">
            <div class="progress-pixel-bar" id="progressBar"></div>
            <div class="progress-text" id="progressPercent">0%</div>
        </div>

        <!-- Live Statistics -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-box">
                <div class="stat-label">SPEED</div>
                <div class="stat-value" id="downloadSpeed">Connecting...</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ETA</div>
                <div class="stat-value" id="downloadEta">--:--</div>
            </div>
        </div>

        <!-- Action Buttons (Shown after completion) -->
        <div id="actionButtons" style="display: none; flex-direction: column; gap: 15px; margin-top: 1.5rem; margin-bottom: 1.5rem;">
            <button class="btn" id="openFolderBtn" style="border: 4px solid black; box-shadow: 4px 4px 0px #000; font-family: 'VT323', monospace; font-size: 1.6rem; padding: 10px; background: var(--btn-green); color: black; border-radius: 0;">
                <i class="bi bi-folder2-open"></i> OPEN DOWNLOADS FOLDER
            </button>
            <a href="/" class="btn" style="border: 4px solid black; box-shadow: 4px 4px 0px #000; font-family: 'VT323', monospace; font-size: 1.6rem; padding: 10px; background: white; color: black; text-decoration: none; display: block; text-align: center; border-radius: 0;">
                <i class="bi bi-house-door-fill"></i> BACK TO HOME
            </a>
        </div>

        <!-- Error Dialog -->
        <div id="errorAlert" class="alert alert-danger d-none mt-3" style="border: 3px solid black; background: #FFB7B2; color: black; border-radius: 0; text-align: left; font-family: var(--text-sans); font-size: 1.1rem;">
            <i class="bi bi-exclamation-triangle-fill"></i> <span id="errorText"></span>
            <div class="mt-3">
                <a href="/" class="btn" style="border: 3px solid black; box-shadow: 3px 3px 0px #000; font-family: 'VT323', monospace; font-size: 1.2rem; background: white; color: black; text-decoration: none; border-radius: 0;">
                    <i class="bi bi-house-door-fill"></i> BACK TO HOME
                </a>
            </div>
        </div>

        <div class="progress-note mt-3" id="helperNote">
            <i class="bi bi-info-circle me-2"></i>
            Files are saved to: <strong style="word-break: break-all;">{{ save_folder }}</strong>
        </div>
    </div>

    <script>
        window.onload = function () {
            const url = "{{ url }}";
            const format_type = "{{ format_type }}";
            const bitrate = "{{ bitrate }}";
            const subtitles = "{{ subtitles }}";
            const download_id = "{{ download_id }}";

            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const downloadSpeed = document.getElementById('downloadSpeed');
            const downloadEta = document.getElementById('downloadEta');
            const statusMessage = document.getElementById('statusMessage');
            const errorAlert = document.getElementById('errorAlert');
            const errorText = document.getElementById('errorText');
            const spinner = document.getElementById('spinner');
            const actionButtons = document.getElementById('actionButtons');

            // 1. Post parameters to backend to start the download thread
            const formData = new FormData();
            formData.append('url', url);
            formData.append('format_type', format_type);
            formData.append('bitrate', bitrate);
            formData.append('subtitles', subtitles);
            formData.append('download_id', download_id);

            fetch('/download_start', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                    return;
                }

                // 2. Connect to the SSE progress stream
                const source = new EventSource('/download_progress/' + download_id);

                source.onmessage = function (event) {
                    const progress = JSON.parse(event.data);

                    if (progress.status === 'starting') {
                        statusMessage.textContent = 'Locating file and fetching stream formats...';
                        progressBar.style.width = '3%';
                        progressPercent.textContent = '3%';
                    } else if (progress.status === 'downloading') {
                        statusMessage.textContent = 'Downloading media chunks to local storage...';
                        progressBar.style.width = progress.percent + '%';
                        progressPercent.textContent = progress.percent + '%';
                        downloadSpeed.textContent = progress.speed || 'Downloading...';
                        downloadEta.textContent = progress.eta || 'Calculating...';
                    } else if (progress.status === 'processing') {
                        statusMessage.textContent = 'Merging video and audio layers via FFmpeg...';
                        progressBar.style.width = '99%';
                        progressPercent.textContent = '99%';
                        downloadSpeed.textContent = 'Processing...';
                        downloadEta.textContent = 'Working...';
                    } else if (progress.status === 'completed') {
                        statusMessage.textContent = 'Success! File saved directly to your folder.';
                        progressBar.style.width = '100%';
                        progressPercent.textContent = '100%';
                        downloadSpeed.textContent = 'Done';
                        downloadEta.textContent = '00:00';
                        
                        source.close();
                        spinner.style.animation = 'none'; // Stop bouncing
                        
                        // Show direct Action Buttons
                        actionButtons.style.display = 'flex';
                    } else if (progress.status === 'error') {
                        showError(progress.message);
                        source.close();
                    }
                };

                source.onerror = function () {
                    showError('Server connection lost. Please verify the application is running.');
                    source.close();
                };
            })
            .catch(err => {
                showError(err.message || 'An error occurred while preparing the download thread.');
            });

            // Open Folder Action
            document.getElementById('openFolderBtn').addEventListener('click', function() {
                fetch('/open_folder', { method: 'POST' });
            });

            function showError(msg) {
                errorText.textContent = msg;
                errorAlert.classList.remove('d-none');
                statusMessage.textContent = 'Download failed.';
                downloadSpeed.textContent = 'Error';
                downloadEta.textContent = 'Error';
                spinner.style.display = 'none';
                document.getElementById('statsGrid').style.display = 'none';
                progressBar.style.background = '#FFB7B2';
            }
        };
    </script>
</body>

</html>
